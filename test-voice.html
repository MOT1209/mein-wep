<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Rashid AI Voice Test — Test Arabic and English speech synthesis voices.">
    <link rel="canonical" href="https://rashid-wep.vercel.app/test-voice.html">
    <meta property="og:type" content="website">
    <meta property="og:title" content="اختبار الصوت العربي - Rashid AI">
    <meta property="og:description" content="Rashid AI Voice Test — Test Arabic and English speech synthesis voices.">
    <meta property="og:image" content="images/logo.png">
    <meta property="og:url" content="https://rashid-wep.vercel.app/test-voice.html">
    <title>اختبار الصوت العربي - Rashid AI</title>
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4804302403615958" crossorigin="anonymous"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #667eea;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }

        .test-section {
            margin-bottom: 30px;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 10px;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        #console {
            background: #1e1e1e;
            color: #00ff00;
            padding: 20px;
            border-radius: 10px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            max-height: 400px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .voice-item {
            background: #f5f5f5;
            padding: 10px;
            margin: 5px 0;
            border-radius: 5px;
            border-right: 4px solid #667eea;
        }

        .voice-name {
            font-weight: bold;
            color: #667eea;
        }

        .voice-lang {
            color: #666;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🎤 اختبار الصوت العربي</h1>
        <p class="subtitle">Rashid AI Voice Test</p>

        <div class="test-section">
            <button onclick="testArabicVoice()">🗣️ اختبر الصوت العربي</button>
            <button onclick="listAllVoices()">📋 عرض جميع الأصوات المتاحة</button>
            <button onclick="testEnglishVoice()">🇬🇧 Test English Voice</button>
            <button onclick="clearConsole()">🗑️ مسح السجل</button>
        </div>

        <div id="console">جاهز للاختبار... اضغط على أي زر أعلاه</div>
    </div>

    <script>
        const synth = window.speechSynthesis;
        let voices = [];

        function log(message) {
            const consoleDiv = document.getElementById('console');
            consoleDiv.innerHTML += message + '\n';
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
        }

        function clearConsole() {
            document.getElementById('console').innerHTML = '';
        }

        function loadVoices() {
            voices = synth.getVoices();
            log(`✅ تم تحميل ${voices.length} صوت`);
        }

        // Load voices
        if (synth.onvoiceschanged !== undefined) {
            synth.onvoiceschanged = loadVoices;
        }
        loadVoices();

        function testArabicVoice() {
            clearConsole();
            log('🔍 البحث عن الأصوات العربية...\n');

            const arabicVoices = voices.filter(v =>
                v.lang.startsWith('ar') || v.lang.includes('ar-')
            );

            log(`📢 عدد الأصوات العربية المتاحة: ${arabicVoices.length}\n`);

            if (arabicVoices.length === 0) {
                log('❌ لا توجد أصوات عربية متاحة على هذا الجهاز!');
                log('💡 الحل: قم بتثبيت حزمة اللغة العربية من إعدادات Windows');
                return;
            }

            // Try to find Microsoft Arabic voice
            let selectedVoice = arabicVoices.find(v =>
                v.name.includes('Microsoft') || v.name.includes('Hoda') || v.name.includes('Naayf')
            );

            if (!selectedVoice) {
                selectedVoice = arabicVoices.find(v => v.name.includes('Google'));
            }

            if (!selectedVoice) {
                selectedVoice = arabicVoices[0];
            }

            log(`✅ الصوت المختار: ${selectedVoice.name}`);
            log(`📍 اللغة: ${selectedVoice.lang}`);
            log(`💾 ${selectedVoice.localService ? 'محلي' : 'عبر الإنترنت'}\n`);
            log('🗣️ جاري التحدث...\n');

            const utterance = new SpeechSynthesisUtterance('مرحباً! أنا راشد AI، مساعدك الذكي. كيف يمكنني مساعدتك اليوم؟');
            utterance.voice = selectedVoice;
            utterance.lang = 'ar-SA';
            utterance.rate = 0.9;
            utterance.pitch = 1.0;

            utterance.onstart = () => {
                log('▶️ بدأ التحدث...');
            };

            utterance.onend = () => {
                log('✅ انتهى التحدث بنجاح!');
            };

            utterance.onerror = (event) => {
                log(`❌ خطأ: ${event.error}`);
            };

            synth.speak(utterance);
        }

        function testEnglishVoice() {
            clearConsole();
            log('🔍 Searching for English voices...\n');

            const englishVoices = voices.filter(v => v.lang.includes('en'));

            if (englishVoices.length === 0) {
                log('❌ No English voices available!');
                return;
            }

            const selectedVoice = englishVoices.find(v => v.name.includes('Google')) || englishVoices[0];

            log(`✅ Selected Voice: ${selectedVoice.name}`);
            log(`📍 Language: ${selectedVoice.lang}\n`);
            log('🗣️ Speaking...\n');

            const utterance = new SpeechSynthesisUtterance('Hello! I am Rashid AI, your intelligent assistant. How can I help you today?');
            utterance.voice = selectedVoice;
            utterance.lang = 'en-US';

            utterance.onend = () => {
                log('✅ Speech completed successfully!');
            };

            synth.speak(utterance);
        }

        function listAllVoices() {
            clearConsole();
            log('📋 جميع الأصوات المتاحة:\n');
            log('═'.repeat(50) + '\n');

            const arabicVoices = voices.filter(v => v.lang.startsWith('ar') || v.lang.includes('ar-'));
            const englishVoices = voices.filter(v => v.lang.includes('en'));
            const otherVoices = voices.filter(v => !v.lang.startsWith('ar') && !v.lang.includes('ar-') && !v.lang.includes('en'));

            if (arabicVoices.length > 0) {
                log('🇸🇦 الأصوات العربية:\n');
                arabicVoices.forEach((v, i) => {
                    log(`${i + 1}. ${v.name}`);
                    log(`   اللغة: ${v.lang}`);
                    log(`   النوع: ${v.localService ? 'محلي ✅' : 'عبر الإنترنت 🌐'}\n`);
                });
            } else {
                log('❌ لا توجد أصوات عربية!\n');
            }

            log('─'.repeat(50) + '\n');

            if (englishVoices.length > 0) {
                log('🇬🇧 English Voices:\n');
                englishVoices.forEach((v, i) => {
                    log(`${i + 1}. ${v.name} (${v.lang}) ${v.localService ? '[Local]' : '[Remote]'}`);
                });
                log('\n');
            }

            log('─'.repeat(50) + '\n');
            log(`📊 الإجمالي: ${voices.length} صوت`);
            log(`   🇸🇦 عربي: ${arabicVoices.length}`);
            log(`   🇬🇧 إنجليزي: ${englishVoices.length}`);
            log(`   🌍 أخرى: ${otherVoices.length}`);
        }
    </script>
</body>

</html>

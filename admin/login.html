<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal | Rashid</title>
    <meta name="description" content="Rashid Admin Portal — Secure system access for content management.">
    <meta name="robots" content="noindex, nofollow">
    <link rel="canonical" href="https://rashid-wep.vercel.app/admin/login.html">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4804302403615958" crossorigin="anonymous"></script>

    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Use correct relative path to config -->
    <script src="../js/supabase-config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #09090b;
            --card-bg: rgba(24, 24, 27, 0.6);
            --accent: #6d28d9;
            --accent-glow: #8b5cf6;
            --text: #ffffff;
            --error: #ef4444;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg);
            background-image:
                radial-gradient(at 0% 0%, rgba(109, 40, 217, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.15) 0px, transparent 50%);
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            color: var(--text);
        }

        .login-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: floatIn 0.6s ease-out;
            position: relative;
        }

        .card-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .card-header i {
            font-size: 3rem;
            color: var(--accent-glow);
            margin-bottom: 15px;
            filter: drop-shadow(0 0 10px var(--accent));
        }

        .card-header h2 {
            margin: 0;
            font-size: 1.8rem;
            font-weight: 700;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: #a1a1aa;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #71717a;
        }

        input {
            width: 100%;
            padding: 12px 15px 12px 45px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-family: inherit;
            font-size: 1rem;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-glow);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
            background: rgba(0, 0, 0, 0.5);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent), var(--accent-glow));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px rgba(139, 92, 246, 0.5);
        }

        .error-msg {
            color: var(--error);
            text-align: center;
            margin-top: 15px;
            font-size: 0.9rem;
            display: none;
            padding: 10px;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 8px;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: #71717a;
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .back-link a:hover {
            color: white;
        }

        @keyframes floatIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <div class="login-card">
        <div class="card-header">
            <i class="fas fa-fingerprint"></i>
            <h2>System Access</h2>
        </div>

        <!-- Login Form -->
        <form id="admin-login-form">
            <div class="form-group">
                <label>Email</label>
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="email" id="admin-username" placeholder="Email" required>
                </div>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="admin-password" placeholder="Password" required>
                </div>
            </div>

            <button type="submit" class="btn-login" id="login-submit-btn">Authenticate</button>
            <div class="error-msg" id="admin-login-error">
                <i class="fas fa-circle-exclamation"></i> Invalid Credentials
            </div>
        </form>

        <div style="text-align:center;margin-top:16px;">
            <a href="#" id="toggle-auth-mode" style="color:#8b5cf6;text-decoration:none;font-size:0.9rem;">
                <i class="fas fa-user-plus"></i> Create New Account
            </a>
            <span style="color:#3f3f46;margin:0 8px;">|</span>
            <a href="#" id="forgot-password-link" style="color:#71717a;text-decoration:none;font-size:0.85rem;">
                <i class="fas fa-key"></i> Forgot Password
            </a>
        </div>

        <div class="back-link" style="margin-top:12px;">
            <a href="../index.html"><i class="fas fa-arrow-left"></i> Return to Site</a>
        </div>
    </div>

    <script>
        let isSignupMode = false;

        // Override openDashboard for login page → redirect to dashboard
        window.openDashboard = function () {
            window.location.href = 'dashboard.html';
        };

        // Toggle login / signup
        document.getElementById('toggle-auth-mode').addEventListener('click', (e) => {
            e.preventDefault();
            isSignupMode = !isSignupMode;
            const form = document.getElementById('admin-login-form');
            const btn = document.getElementById('login-submit-btn');
            const toggle = document.getElementById('toggle-auth-mode');
            const error = document.getElementById('admin-login-error');
            error.style.display = 'none';
            if (isSignupMode) {
                btn.textContent = 'Create Account';
                toggle.innerHTML = '<i class="fas fa-sign-in-alt"></i> Already have an account? Login';
                form.querySelector('label').textContent = 'New Email';
            } else {
                btn.textContent = 'Authenticate';
                toggle.innerHTML = '<i class="fas fa-user-plus"></i> Create New Account';
                form.querySelector('label').textContent = 'Email';
            }
        });

        // Forgot password
        document.getElementById('forgot-password-link').addEventListener('click', async (e) => {
            e.preventDefault();
            const client = window.supabaseClient;
            if (!client) { alert('Supabase not available'); return; }
            const email = document.getElementById('admin-username').value.trim();
            if (!email) { alert('Enter your email first, then click Forgot Password.'); return; }
            const { error } = await client.auth.resetPasswordForEmail(email);
            if (error) alert(error.message);
            else alert('Password reset email sent to ' + email + '. Check your inbox.');
        });

        // Handle signup
        const originalSubmit = document.getElementById('admin-login-form').addEventListener;
        document.getElementById('admin-login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const client = window.supabaseClient;
            if (!client) { alert('Supabase not available'); return; }
            const email = document.getElementById('admin-username').value.trim();
            const password = document.getElementById('admin-password').value;
            const errorEl = document.getElementById('admin-login-error');
            errorEl.style.display = 'none';

            if (isSignupMode) {
                const { data, error } = await client.auth.signUp({ email, password });
                if (error) {
                    errorEl.innerText = error.message;
                    errorEl.style.display = 'block';
                    document.getElementById('admin-login-form').classList.add('shake');
                    setTimeout(() => document.getElementById('admin-login-form').classList.remove('shake'), 500);
                } else {
                    // Try to add user to admin_users via RPC
                    try { await client.rpc('add_admin_user'); } catch {}
                    alert('Account created! Check your email for confirmation, then login.');
                    isSignupMode = false;
                    document.getElementById('login-submit-btn').textContent = 'Authenticate';
                    document.getElementById('toggle-auth-mode').innerHTML = '<i class="fas fa-user-plus"></i> Create New Account';
                }
            } else {
                const { data, error } = await client.auth.signInWithPassword({ email, password });
                if (error) {
                    errorEl.innerText = error.message;
                    errorEl.style.display = 'block';
                    document.getElementById('admin-login-form').classList.add('shake');
                    setTimeout(() => document.getElementById('admin-login-form').classList.remove('shake'), 500);
                } else {
                    window.location.href = 'dashboard.html';
                }
            }
        });

        // Add CSS for shake inline for convenience
        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
                20%, 40%, 60%, 80% { transform: translateX(5px); }
            }
            .shake { animation: shake 0.4s; }
        `;
        document.head.appendChild(style);
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal | Rashid</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Use correct relative path to config -->
    <script src="../js/supabase-config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #09090b;
            --card-bg: rgba(24, 24, 27, 0.6);
            --accent: #6d28d9;
            --accent-glow: #8b5cf6;
            --text: #ffffff;
            --error: #ef4444;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg);
            background-image:
                radial-gradient(at 0% 0%, rgba(109, 40, 217, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.15) 0px, transparent 50%);
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            color: var(--text);
        }

        .login-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: floatIn 0.6s ease-out;
            position: relative;
        }

        .card-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .card-header i {
            font-size: 3rem;
            color: var(--accent-glow);
            margin-bottom: 15px;
            filter: drop-shadow(0 0 10px var(--accent));
        }

        .card-header h2 {
            margin: 0;
            font-size: 1.8rem;
            font-weight: 700;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: #a1a1aa;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #71717a;
        }

        input {
            width: 100%;
            padding: 12px 15px 12px 45px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-family: inherit;
            font-size: 1rem;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-glow);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
            background: rgba(0, 0, 0, 0.5);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent), var(--accent-glow));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px rgba(139, 92, 246, 0.5);
        }

        .error-msg {
            color: var(--error);
            text-align: center;
            margin-top: 15px;
            font-size: 0.9rem;
            display: none;
            padding: 10px;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 8px;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: #71717a;
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .back-link a:hover {
            color: white;
        }

        @keyframes floatIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <div class="login-card">
        <div class="card-header">
            <i class="fas fa-fingerprint"></i>
            <h2>System Access</h2>
        </div>

        <form id="admin-login-form">
            <div class="form-group">
                <label>Identifier</label>
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text" id="admin-username" placeholder="Email (as Identifier)" required>
                </div>
            </div>

            <div class="form-group">
                <label>Security Key</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="admin-password" placeholder="Password" required>
                </div>
            </div>

            <button type="submit" class="btn-login">Authenticate</button>
            <div class="error-msg" id="admin-login-error">
                <i class="fas fa-circle-exclamation"></i> Invalid Credentials
            </div>
        </form>

        <div class="back-link">
            <a href="../index.html"><i class="fas fa-arrow-left"></i> Return to Site</a>
        </div>
    </div>

    <!-- Admin Logic -->
    <script src="../js/admin.js?v=4.0"></script>

    <script>
        // Custom Dashboard redirect logic if needed
        // The admin.js handles SIGNED_IN by calling openDashboard()
        // We can override openDashboard for the login page specifically.
        window.openDashboard = function () {
            window.location.href = 'dashboard.html';
        };

        // Add CSS for shake inline for convenience
        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
                20%, 40%, 60%, 80% { transform: translateX(5px); }
            }
            .shake { animation: shake 0.4s; }
        `;
        document.head.appendChild(style);
    </script>
</body>

</html>

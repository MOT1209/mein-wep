<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#7ec0ee" />
  <title>KingCraft</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/hud.css" />
  <link rel="stylesheet" href="css/menu.css" />
  <link rel="stylesheet" href="css/inventory.css" />
  <link rel="stylesheet" href="css/health.css" />
  <link rel="icon" href="icons/icon-48.png" />

  <!-- شاشة تشخيص الأخطاء: تُظهر أي خطأ بدل الصمت -->
  <script>
    function kcError(msg) {
      var d = document.getElementById("kc-error");
      if (!d) {
        d = document.createElement("div");
        d.id = "kc-error";
        d.style.cssText = "position:fixed;inset:0;z-index:9999;background:rgba(120,0,0,0.95);color:#fff;font:14px/1.6 monospace;padding:24px;overflow:auto;white-space:pre-wrap;direction:ltr;text-align:left";
        document.body.appendChild(d);
        d.textContent = "⚠️ KingCraft — خطأ في التحميل:\n\n";
      }
      d.textContent += msg + "\n";
    }
    window.addEventListener("error", function (e) {
      kcError((e.message || e.error || "script error") + (e.filename ? "\n  @ " + e.filename + ":" + e.lineno : ""));
    });
    window.addEventListener("unhandledrejection", function (e) {
      kcError("Promise rejected: " + (e.reason && e.reason.message ? e.reason.message : e.reason));
    });
    if (location.protocol === "file:") {
      kcError("فتحت اللعبة عبر file:// — وحدات JavaScript لا تعمل بهذا الشكل.\nشغّل خادمًا محليًا وافتح:  http://127.0.0.1:8099/index.html");
    }
  </script>

  <!-- تفريغ Cache الـ Service Worker القديم فوراً قبل تحميل أي موديول -->
  <script>
    if ('caches' in window) { caches.keys().then(function(ks) { ks.forEach(function(k) { caches.delete(k); }); }); }
    if ('serviceWorker' in navigator) { navigator.serviceWorker.getRegistrations().then(function(rs) { rs.forEach(function(r) { r.unregister(); }); }); }
  </script>

  <!-- Three.js r160 via importmap (static, CDN) -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <!-- Loading / Main menu (Minecraft style) -->
  <div id="menu" class="menu">
    <div class="menu-panorama">
      <div class="menu-cloud"></div>
      <div class="menu-cloud"></div>
      <div class="menu-cloud"></div>
    </div>
    <div class="menu-panel">
      <h1 class="logo">KingCraft</h1>
      <span class="logo-sub">عالم المكعبات</span>
      <button id="btn-play" class="btn-mc">▶ Play</button>
      <button id="btn-settings" class="btn-mc">⚙ Settings</button>
      <button id="btn-marketplace" class="btn-mc">🛒 Marketplace</button>
      <button id="btn-exit" class="btn-mc">✕ Exit</button>
      <p class="hint">WASD للحركة • مسافة للقفز • Shift زحف • Ctrl جري • V منظور</p>
      <p class="version">v0.4 — Minecraft UI</p>
    </div>
  </div>

  <!-- Settings panel -->
  <div id="settings-panel" class="settings-panel">
    <div class="settings-box">
      <h2>⚙ Settings</h2>
      <div class="settings-row">
        <span>🔊 Volume</span>
        <input type="range" id="vol-slider" min="0" max="100" value="30" />
      </div>
      <div class="settings-row">
        <span>🖱 Sensitivity</span>
        <input type="range" id="sens-slider" min="1" max="20" value="10" />
      </div>
      <button id="btn-back-menu" class="btn-back">← Back</button>
    </div>
  </div>

  <!-- Coming soon modal -->
  <div id="modal-coming">
    <div class="modal-box">
      <h2>🚧 قريباً</h2>
      <p>Coming Soon — تحت التطوير</p>
      <button id="btn-close-coming" class="btn-back">OK</button>
    </div>
  </div>

  <!-- Exit confirm modal -->
  <div id="modal-exit">
    <div class="modal-box">
      <h2>✕ Exit Game?</h2>
      <p>Are you sure you want to leave?</p>
      <div class="modal-btns">
        <button id="btn-confirm-exit" class="btn-mc">✔ Yes</button>
        <button id="btn-cancel-exit" class="btn-mc">✖ No</button>
      </div>
    </div>
  </div>

  <!-- HUD -->
  <div id="crosshair" class="crosshair hidden">+</div>

  <div id="hud" class="hud hidden">
    <div id="hotbar" class="hotbar"></div>
    <div id="health-bar" class="stat-bar"></div>
    <div id="food-bar" class="stat-bar"></div>
  </div>

  <div id="death-screen" class="hidden">
    <h2>💀 لقد مت</h2>
    <button id="btn-respawn" class="btn-mc">إعادة الحياة</button>
  </div>

  <div id="debug" class="debug hidden"></div>

  <canvas id="game"></canvas>

  <script type="module" src="js/main.js"></script>
</body>
</html>

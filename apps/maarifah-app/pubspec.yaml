name: maarifah_app
description: تطبيق معرفة - منصة تعليمية ومعرفية متكاملة (Clean Architecture)
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Routing
  go_router: ^14.2.0

  # Local persistence
  shared_preferences: ^2.2.3

  # UI helpers
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  fl_chart: ^0.68.0
  cached_network_image: ^3.3.1

  # Utils
  uuid: ^4.4.0
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  test: ^1.31.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/data/

# One-time workflow to generate a release keystore
# Run this manually, download the artifact, then set as GitHub secret

name: 🔐 Generate Keystore

on:
  workflow_dispatch:
    inputs:
      keystore_password:
        description: 'Keystore password'
        required: true
        type: string
        default: 'Rashid2024!'
      key_alias:
        description: 'Key alias'
        required: true
        type: string
        default: 'rashid-key'
      key_password:
        description: 'Key password (leave empty = same as keystore)'
        required: false
        type: string

jobs:
  generate:
    name: Generate Keystore
    runs-on: ubuntu-latest
    steps:
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Generate keystore
        run: |
          KEY_PASS="${{ inputs.key_password || inputs.keystore_password }}"
          keytool -genkey -v \
            -keystore rashid-release-key.jks \
            -storepass "${{ inputs.keystore_password }}" \
            -alias "${{ inputs.key_alias }}" \
            -keypass "$KEY_PASS" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Rashid, OU=Developer, O=Rashid Apps, L=Unknown, ST=Unknown, C=SA" \
            -storetype JKS

          echo ""
          echo "=== Keystore generated ==="
          echo "File: rashid-release-key.jks"
          echo "Alias: ${{ inputs.key_alias }}"
          echo ""

          # Base64 encode for GitHub secret
          base64 -w0 rashid-release-key.jks > rashid-release-key.b64
          echo "Base64 encoded (for GitHub Secret KEYSTORE_BASE64):"
          wc -c rashid-release-key.b64

      - name: Upload keystore artifact
        uses: actions/upload-artifact@v4
        with:
          name: rashid-release-keystore
          path: rashid-release-key.jks
          if-no-files-found: error

      - name: Output secrets to set
        run: |
          echo "=========================================="
          echo "  Add these secrets to your GitHub repo:"
          echo "=========================================="
          echo ""
          echo "KEYSTORE_BASE64: (content of rashid-release-key.b64)"
          echo "KEYSTORE_PASSWORD: ${{ inputs.keystore_password }}"
          echo "KEY_ALIAS: ${{ inputs.key_alias }}"
          echo "KEY_PASSWORD: ${{ inputs.key_password || inputs.keystore_password }}"
          echo ""
          echo "=========================================="
          echo "  Then delete this workflow file or disable it"
          echo "  to prevent unauthorized keystore generation."
          echo "=========================================="

      - name: Upload base64 version (for copy-paste)
        uses: actions/upload-artifact@v4
        with:
          name: rashid-release-key-b64
          path: rashid-release-key.b64
          if-no-files-found: error

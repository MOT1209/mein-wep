    <style>
        body { font-family: 'Outfit', sans-serif; background: #09090b; color: #fff; padding: 100px 20px 40px; }
        .container { max-width: 900px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 50px; position: relative; }
        .header h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .header i { color: #22c55e; margin-right: 10px; }
        
        /* Premium Action Controls */
        .controls-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        /* Code Grid & Cards */
        .code-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
        .code-card { background: rgba(24, 24, 27, 0.8); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; overflow: hidden; transition: all 0.3s ease; display: flex; flex-direction: column; }
        .code-card:hover { transform: translateY(-4px); border-color: rgba(34, 197, 94, 0.4); box-shadow: 0 10px 30px rgba(34, 197, 94, 0.05); }
        .code-header { background: #18181b; padding: 15px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; }
        .code-header-left { display: flex; flex-direction: column; gap: 4px; }
        .code-header h3 { color: #22c55e; font-size: 1rem; margin: 0; }
        .code-meta { display: flex; align-items: center; gap: 8px; }
        .code-lang { background: rgba(34, 197, 94, 0.15); color: #22c55e; padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: 600; border: 1px solid rgba(34, 197, 94, 0.25); }
        
        /* Delete Button Style */
        .btn-delete { background: none; border: none; color: #ef4444; cursor: pointer; padding: 6px; font-size: 0.95rem; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; transition: all 0.2s ease; }
        .btn-delete:hover { background: rgba(239, 68, 68, 0.15); transform: scale(1.1); }
        
        .code-body { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        pre { background: #0a0a0a; padding: 15px; border-radius: 8px; overflow-x: auto; font-family: 'Fira Code', monospace; font-size: 0.85rem; color: #a1a1aa; margin: 0 0 15px 0; border: 1px solid rgba(255, 255, 255, 0.05); max-height: 250px; }
        .tags-container { display: flex; flex-wrap: wrap; gap: 6px; }
        .tag { display: inline-block; background: rgba(255, 255, 255, 0.05); color: rgba(255, 255, 255, 0.7); padding: 4px 10px; border-radius: 6px; font-size: 0.72rem; border: 1px solid rgba(255, 255, 255, 0.08); }
        .back-link { display: inline-flex; align-items: center; gap: 8px; color: #8b5cf6; text-decoration: none; margin-bottom: 30px; font-weight: 500; transition: color 0.3s ease; }
        .back-link:hover { color: #a78bfa; }

        /* Premium Green Trigger Button */
        .btn-trigger-add { background: #22c55e; color: #000; border: none; padding: 12px 24px; border-radius: 50px; font-weight: 600; font-size: 0.9rem; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; transition: all 0.3s ease; box-shadow: 0 4px 20px rgba(34, 197, 94, 0.3); }
        .btn-trigger-add:hover { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(34, 197, 94, 0.45); filter: brightness(1.1); }

        /* Modal Overlay */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); z-index: 9999; display: flex; align-items: center; justify-content: center; opacity: 0; visibility: hidden; transition: all 0.3s ease; }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        
        /* Modal Content */
        .modal-card { background: rgba(18, 18, 20, 0.95); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; width: 90%; max-width: 550px; padding: 35px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); transform: translateY(20px) scale(0.95); transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); position: relative; }
        .modal-overlay.active .modal-card { transform: translateY(0) scale(1); }
        
        .modal-close { position: absolute; top: 20px; right: 20px; background: none; border: none; color: #a1a1aa; font-size: 1.2rem; cursor: pointer; transition: color 0.2s ease; }
        .modal-close:hover { color: #fff; }
        
        .modal-card h2 { font-size: 1.5rem; margin-top: 0; margin-bottom: 25px; display: flex; align-items: center; gap: 10px; }
        .modal-card h2 i { color: #22c55e; }
        
        /* Form Styling */
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: 500; color: rgba(255, 255, 255, 0.7); margin-bottom: 8px; }
        .form-control { background: rgba(10, 10, 10, 0.6); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 10px; color: #fff; padding: 12px 16px; font-size: 0.9rem; width: 100%; box-sizing: border-box; transition: all 0.3s ease; font-family: inherit; }
        .form-control:focus { outline: none; border-color: #22c55e; box-shadow: 0 0 12px rgba(34, 197, 94, 0.2); background: rgba(10, 10, 10, 0.9); }
        textarea.form-control { font-family: 'Fira Code', monospace; font-size: 0.85rem; resize: vertical; min-height: 120px; }
        select.form-control { cursor: pointer; appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E"); background-repeat: no-repeat; background-position: right 16px center; background-size: 16px; padding-right: 40px; }
        
        .btn-submit { background: #22c55e; color: #000; border: none; padding: 14px 28px; border-radius: 12px; font-weight: 600; font-size: 0.95rem; width: 100%; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(34, 197, 94, 0.2); }
        .btn-submit:hover { filter: brightness(1.1); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(34, 197, 94, 0.35); }

        @media (max-width: 768px) {
            body { padding-top: 80px; }
            .header h1 { font-size: 2rem; }
            .controls-row { flex-direction: column; gap: 15px; align-items: stretch; }
            .btn-trigger-add { justify-content: center; }
            .code-grid { grid-template-columns: 1fr; }
            .modal-card { padding: 25px; }
        }

<body>
    <div class="container">
        <a href="../../index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Rashid</a>
        
        <div class="header">
            <h1><i class="fas fa-code"></i> Code Library</h1>
            <p style="color: #a1a1aa;">Clean, reusable code snippets and modules</p>
        </div>

        <div class="controls-row">
            <span style="color: rgba(255, 255, 255, 0.5); font-size: 0.9rem;" id="snippet-counter">Showing 0 snippets</span>
            <button class="btn-trigger-add" id="open-modal-btn">
                <i class="fas fa-plus"></i> Add New Snippet
            </button>
        </div>
        
        <div class="code-grid" id="snippets-grid">
            <!-- Dynamic snippets will be injected here -->
        </div>
    </div>

    <!-- Modal Form overlay -->
    <div class="modal-overlay" id="add-modal-overlay">
        <div class="modal-card">
            <button class="modal-close" id="close-modal-btn"><i class="fas fa-times"></i></button>
            <h2><i class="fas fa-code"></i> Add New Snippet</h2>
            <form id="add-snippet-form">
                <div class="form-group">
                    <label for="snippet-title">Snippet Title</label>
                    <input type="text" id="snippet-title" class="form-control" placeholder="e.g. Center Element with CSS" required>
                </div>
                
                <div class="form-group">
                    <label for="snippet-lang">Language</label>
                    <select id="snippet-lang" class="form-control" required>
                        <option value="" disabled selected>Select Language</option>
                        <option value="JavaScript">JavaScript</option>
                        <option value="CSS">CSS</option>
                        <option value="Three.js">Three.js</option>
                        <option value="HTML">HTML</option>
                        <option value="Rust">Rust</option>
                        <option value="SQL">SQL</option>
                        <option value="Python">Python</option>
                        <option value="Bash">Bash</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="snippet-code">Code Content</label>
                    <textarea id="snippet-code" class="form-control" placeholder="// Paste your code here..." required></textarea>
                </div>
                
                <div class="form-group">
                    <label for="snippet-tags">Tags (Comma-separated)</label>
                    <input type="text" id="snippet-tags" class="form-control" placeholder="e.g. grid, layout, centering">
                </div>
                
                <button type="submit" class="btn-submit">Add to Library</button>
            </form>
        </div>
    </div>

    <script>
        // Default codes structure to populate LocalStorage on first run
        const defaultSnippets = [
            {
                id: "default-1",
                title: "Dark Mode Toggle",
                lang: "JavaScript",
                code: "const toggle = document.getElementById('theme-toggle');\ntoggle.addEventListener('click', () => {\n    document.body.classList.toggle('dark-mode');\n    localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');\n});",
                tags: ["UI", "Utility"]
            },
            {
                id: "default-2",
                title: "API Fetch Wrapper",
                lang: "JavaScript",
                code: "async function apiFetch(url, options = {}) {\n    const res = await fetch(url, {\n        headers: { 'Content-Type': 'application/json' },\n        ...options\n    });\n    if (!res.ok) throw new Error(`Error: \${res.status}`);\n    return res.json();\n}",
                tags: ["API", "Network"]
            },
            {
                id: "default-3",
                title: "3D Camera Controller",
                lang: "Three.js",
                code: "import { OrbitControls } from 'three/addons/controls/OrbitControls.js';\nconst controls = new OrbitControls(camera, renderer.domElement);\ncontrols.enableDamping = true;\ncontrols.dampingFactor = 0.05;",
                tags: ["3D", "Game"]
            },
            {
                id: "default-4",
                title: "Local Storage Helper",
                lang: "JavaScript",
                code: "const storage = {\n    set: (key, val) => localStorage.setItem(key, JSON.stringify(val)),\n    get: (key) => JSON.parse(localStorage.getItem(key) || 'null'),\n    remove: (key) => localStorage.removeItem(key)\n};",
                tags: ["Storage", "Utility"]
            },
            {
                id: "default-5",
                title: "PWA Service Worker",
                lang: "JavaScript",
                code: "self.addEventListener('fetch', e => {\n    e.respondWith(\n        caches.match(e.request).then(r => r || fetch(e.request))\n    );\n});",
                tags: ["PWA", "Offline"]
            },
            {
                id: "default-6",
                title: "CSS Grid Responsive",
                lang: "CSS",
                code: ".grid {\n    display: grid;\n    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));\n    gap: 20px;\n}",
                tags: ["CSS", "Responsive"]
            }
        ];

        // Core App Logic
        const STORAGE_KEY = "rashid_vault_snippets";
        const modal = document.getElementById('add-modal-overlay');
        const snippetsGrid = document.getElementById('snippets-grid');
        const snippetCounter = document.getElementById('snippet-counter');

        // Modal Controls
        document.getElementById('open-modal-btn').addEventListener('click', () => modal.classList.add('active'));
        document.getElementById('close-modal-btn').addEventListener('click', () => modal.classList.remove('active'));
        modal.addEventListener('click', (e) => {
            if (e.target === modal) modal.classList.remove('active');
        });

        // Fetch snippets from local storage
        function getSnippets() {
            const data = localStorage.getItem(STORAGE_KEY);
            if (!data) {
                // Populate default codes on first launch
                localStorage.setItem(STORAGE_KEY, JSON.stringify(defaultSnippets));
                return defaultSnippets;
            }
            return JSON.parse(data);
        }

        // Save snippets to local storage
        function saveSnippets(snippets) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(snippets));
        }

        // Render snippets grid
        function renderSnippets() {
            const snippets = getSnippets();
            snippetsGrid.innerHTML = '';
            
            if (snippets.length === 0) {
                snippetsGrid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 40px 0; color: rgba(255,255,255,0.4);"><i class="fas fa-code-branch" style="font-size: 2.5rem; margin-bottom: 15px; display: block;"></i>No snippets added yet. Click 'Add New Snippet' to start.</div>`;
                snippetCounter.textContent = "Showing 0 snippets";
                return;
            }

            snippetCounter.textContent = `Showing ${snippets.length} snippet${snippets.length > 1 ? 's' : ''}`;

            snippets.forEach(snippet => {
                const card = document.createElement('div');
                card.className = 'code-card';
                
                const tagsHTML = (snippet.tags || []).map(tag => `<span class="tag">${escapeHTML(tag)}</span>`).join('');
                
                card.innerHTML = `
                    <div class="code-header">
                        <div class="code-header-left">
                            <h3>${escapeHTML(snippet.title)}</h3>
                        </div>
                        <div class="code-meta">
                            <span class="code-lang">${escapeHTML(snippet.lang)}</span>
                            <button class="btn-delete" title="Delete Snippet" onclick="deleteSnippet('${snippet.id}')">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </div>
                    </div>
                    <div class="code-body">
                        <pre><code>${escapeHTML(snippet.code)}</code></pre>
                        <div class="tags-container">
                            ${tagsHTML}
                        </div>
                    </div>
                `;
                snippetsGrid.appendChild(card);
            });
        }

        // Escape HTML helper
        function escapeHTML(str) {
            return str
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // Add new snippet handler
        document.getElementById('add-snippet-form').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const title = document.getElementById('snippet-title').value.trim();
            const lang = document.getElementById('snippet-lang').value;
            const code = document.getElementById('snippet-code').value;
            const rawTags = document.getElementById('snippet-tags').value;
            
            const tags = rawTags ? rawTags.split(',').map(tag => tag.trim()).filter(tag => tag.length > 0) : [];
            
            const newSnippet = {
                id: 'snippet-' + Date.now(),
                title,
                lang,
                code,
                tags
            };

            const snippets = getSnippets();
            snippets.unshift(newSnippet); // Put the newest code at the top
            saveSnippets(snippets);
            
            renderSnippets();
            
            // Reset & Close Modal
            document.getElementById('add-snippet-form').reset();
            modal.classList.remove('active');
        });

        // Delete snippet handler
        window.deleteSnippet = function(id) {
            if (confirm("Are you sure you want to delete this snippet?")) {
                const snippets = getSnippets();
                const filtered = snippets.filter(snippet => snippet.id !== id);
                saveSnippets(filtered);
                renderSnippets();
            }
        };

        // Initialize Render
        renderSnippets();
    </script>
</body>

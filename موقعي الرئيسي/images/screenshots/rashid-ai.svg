<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow" cx="0.5" cy="0.3" r="0.6">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="msg1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="msg2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="720" fill="#0a0a12"/>
  <rect width="1280" height="720" fill="url(#glow)"/>

  <!-- Grid pattern -->
  <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
    <rect width="30" height="30" fill="none"/>
    <rect width="1" height="30" fill="rgba(99,102,241,0.04)"/>
    <rect width="30" height="1" fill="rgba(99,102,241,0.04)"/>
  </pattern>
  <rect width="1280" height="720" fill="url(#grid)"/>

  <!-- Chat container -->
  <rect x="200" y="80" width="520" height="560" rx="16" fill="rgba(15,23,42,0.85)" stroke="rgba(99,102,241,0.2)" stroke-width="1"/>
  
  <!-- Chat header -->
  <rect x="200" y="80" width="520" height="56" rx="16" fill="rgba(99,102,241,0.1)"/>
  <rect x="200" y="120" width="520" height="16" fill="rgba(99,102,241,0.1)"/>
  <!-- AI Avatar -->
  <circle cx="235" cy="108" r="18" fill="#6366f1"/>
  <text x="235" y="113" text-anchor="middle" font-family="Arial" font-size="16" fill="#fff" font-weight="bold">AI</text>
  <text x="265" y="105" font-family="Arial, sans-serif" font-size="15" fill="#f1f5f9" font-weight="bold">Rashid AI</text>
  <text x="265" y="120" font-family="Arial, sans-serif" font-size="11" fill="#22c55e">● Online</text>

  <!-- Messages -->
  <!-- User message -->
  <rect x="240" y="160" width="230" height="36" rx="12" fill="rgba(99,102,241,0.15)"/>
  <text x="255" y="183" font-family="Arial, sans-serif" font-size="13" fill="#e2e8f0">What can you help me with?</text>
  
  <!-- AI response -->
  <rect x="450" y="210" width="250" height="80" rx="12" fill="rgba(15,23,42,0.6)" stroke="rgba(99,102,241,0.15)" stroke-width="1"/>
  <text x="465" y="233" font-family="Arial, sans-serif" font-size="13" fill="#cbd5e1">Hello! I'm Rashid AI, your</text>
  <text x="465" y="252" font-family="Arial, sans-serif" font-size="13" fill="#cbd5e1">intelligent assistant. I can</text>
  <text x="465" y="271" font-family="Arial, sans-serif" font-size="13" fill="#cbd5e1">help with coding, writing,</text>
  <text x="465" y="290" font-family="Arial, sans-serif" font-size="13" fill="#38bdf8">and more! 🌟</text>
  <!-- Tail -->
  <polygon points="450,220 440,216 450,230" fill="rgba(15,23,42,0.6)"/>

  <!-- User message 2 -->
  <rect x="230" y="310" width="280" height="36" rx="12" fill="rgba(99,102,241,0.15)"/>
  <text x="245" y="333" font-family="Arial, sans-serif" font-size="13" fill="#e2e8f0">Write a React component in TypeScript</text>

  <!-- AI response 2 -->
  <rect x="450" y="360" width="280" height="140" rx="12" fill="rgba(15,23,42,0.6)" stroke="rgba(99,102,241,0.15)" stroke-width="1"/>
  <text x="465" y="383" font-family="monospace" font-size="12" fill="#6366f1">import React from 'react';</text>
  <text x="465" y="403" font-family="monospace" font-size="12" fill="#e2e8f0">interface ButtonProps {</text>
  <text x="475" y="423" font-family="monospace" font-size="12" fill="#e2e8f0">label: string;</text>
  <text x="475" y="443" font-family="monospace" font-size="12" fill="#e2e8f0">onClick: () =&gt; void;</text>
  <text x="465" y="463" font-family="monospace" font-size="12" fill="#e2e8f0">}</text>
  <text x="465" y="483" font-family="monospace" font-size="12" fill="#22c55e">$$ export const Button ...</text>
  <!-- Tail -->
  <polygon points="450,370 440,366 450,380" fill="rgba(15,23,42,0.6)"/>

  <!-- Typing indicator -->
  <ellipse cx="560" cy="525" rx="3" ry="3" fill="#818cf8"/>
  <ellipse cx="570" cy="525" rx="3" ry="3" fill="#818cf8"/>
  <ellipse cx="580" cy="525" rx="3" ry="3" fill="#818cf8"/>

  <!-- Input bar -->
  <rect x="220" y="590" width="480" height="40" rx="20" fill="rgba(15,23,42,0.6)" stroke="rgba(99,102,241,0.2)" stroke-width="1"/>
  <text x="245" y="615" font-family="Arial, sans-serif" font-size="13" fill="#64748b">Ask me anything...</text>
  <rect x="655" y="598" width="28" height="24" rx="12" fill="#6366f1"/>
  <text x="669" y="614" font-family="Arial" font-size="12" fill="#fff">→</text>

  <!-- Right panel - features -->
  <rect x="760" y="80" width="320" height="240" rx="16" fill="rgba(15,23,42,0.85)" stroke="rgba(99,102,241,0.15)" stroke-width="1"/>
  
  <!-- Feature items -->
  <text x="790" y="115" font-family="Arial, sans-serif" font-size="15" fill="#f1f5f9" font-weight="bold">⚡ Features</text>
  
  <text x="790" y="150" font-family="Arial, sans-serif" font-size="18" fill="#6366f1">✦</text>
  <text x="815" y="150" font-family="Arial, sans-serif" font-size="13" fill="#cbd5e1">Gemini 1.5 Flash AI</text>
  <text x="815" y="165" font-family="Arial, sans-serif" font-size="11" fill="#64748b">Google's latest LLM</text>
  
  <text x="790" y="195" font-family="Arial, sans-serif" font-size="18" fill="#0ea5e9">✦</text>
  <text x="815" y="195" font-family="Arial, sans-serif" font-size="13" fill="#cbd5e1">Multilingual</text>
  <text x="815" y="210" font-family="Arial, sans-serif" font-size="11" fill="#64748b">AR, DE, EN + 8 languages</text>

  <text x="790" y="240" font-family="Arial, sans-serif" font-size="18" fill="#22c55e">✦</text>
  <text x="815" y="240" font-family="Arial, sans-serif" font-size="13" fill="#cbd5e1">Voice Support</text>
  <text x="815" y="255" font-family="Arial, sans-serif" font-size="11" fill="#64748b">Speak your questions</text>

  <text x="790" y="285" font-family="Arial, sans-serif" font-size="18" fill="#f59e0b">✦</text>
  <text x="815" y="285" font-family="Arial, sans-serif" font-size="13" fill="#cbd5e1">Code Generation</text>
  <text x="815" y="300" font-family="Arial, sans-serif" font-size="11" fill="#64748b">TypeScript, Python, JS</text>

  <!-- Stats panel -->
  <rect x="760" y="340" width="320" height="160" rx="16" fill="rgba(15,23,42,0.85)" stroke="rgba(99,102,241,0.15)" stroke-width="1"/>
  <text x="790" y="375" font-family="Arial, sans-serif" font-size="15" fill="#f1f5f9" font-weight="bold">📊 Stats</text>
  <text x="790" y="410" font-family="Arial, sans-serif" font-size="13" fill="#cbd5e1">Total Conversations: <tspan fill="#818cf8" font-weight="bold">12,847</tspan></text>
  <text x="790" y="435" font-family="Arial, sans-serif" font-size="13" fill="#cbd5e1">Active Users: <tspan fill="#818cf8" font-weight="bold">3,421</tspan></text>
  <text x="790" y="460" font-family="Arial, sans-serif" font-size="13" fill="#cbd5e1">Response Time: <tspan fill="#22c55e" font-weight="bold">&lt; 1.2s</tspan></text>
  <text x="790" y="485" font-family="Arial, sans-serif" font-size="13" fill="#cbd5e1">Uptime: <tspan fill="#22c55e" font-weight="bold">99.97%</tspan></text>

  <!-- Title -->
  <text x="640" y="690" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="28" font-weight="900" fill="#6366f1" opacity="0.5">Rashid AI</text>
</svg>

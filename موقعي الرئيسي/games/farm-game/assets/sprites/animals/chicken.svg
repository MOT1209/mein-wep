<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 32" width="128" height="32">
  <!-- Chicken Sprite Sheet - 4 frames (idle, walk1, walk2, eat) -->
  
  <!-- Frame 1: Idle -->
  <g transform="translate(0,0)">
    <!-- Body -->
    <ellipse cx="16" cy="18" rx="8" ry="6" fill="#FFD700"/>
    <!-- Head -->
    <circle cx="22" cy="10" r="5" fill="#FFD700"/>
    <!-- Eye -->
    <circle cx="24" cy="9" r="1.5" fill="#000"/>
    <!-- Beak -->
    <polygon points="27,10 30,11 27,12" fill="#FF8C00"/>
    <!-- Comb -->
    <path d="M20,5 Q22,2 24,5 Q26,2 28,5" fill="#FF0000"/>
    <!-- Wattle -->
    <ellipse cx="25" cy="14" rx="1.5" ry="2" fill="#FF0000"/>
    <!-- Legs -->
    <line x1="14" y1="24" x2="14" y2="30" stroke="#FF8C00" stroke-width="2"/>
    <line x1="18" y1="24" x2="18" y2="30" stroke="#FF8C00" stroke-width="2"/>
    <!-- Feet -->
    <path d="M12,30 L14,28 L16,30" fill="none" stroke="#FF8C00" stroke-width="1.5"/>
    <path d="M16,30 L18,28 L20,30" fill="none" stroke="#FF8C00" stroke-width="1.5"/>
    <!-- Wing -->
    <ellipse cx="12" cy="18" rx="4" ry="4" fill="#FFA500"/>
  </g>
  
  <!-- Frame 2: Walk 1 (left leg forward) -->
  <g transform="translate(32,0)">
    <!-- Body -->
    <ellipse cx="16" cy="18" rx="8" ry="6" fill="#FFD700"/>
    <!-- Head -->
    <circle cx="22" cy="10" r="5" fill="#FFD700"/>
    <!-- Eye -->
    <circle cx="24" cy="9" r="1.5" fill="#000"/>
    <!-- Beak -->
    <polygon points="27,10 30,11 27,12" fill="#FF8C00"/>
    <!-- Comb -->
    <path d="M20,5 Q22,2 24,5 Q26,2 28,5" fill="#FF0000"/>
    <!-- Wattle -->
    <ellipse cx="25" cy="14" rx="1.5" ry="2" fill="#FF0000"/>
    <!-- Legs - walking -->
    <line x1="12" y1="24" x2="10" y2="30" stroke="#FF8C00" stroke-width="2"/>
    <line x1="20" y1="24" x2="20" y2="30" stroke="#FF8C00" stroke-width="2"/>
    <!-- Feet -->
    <path d="M8,30 L10,28 L12,30" fill="none" stroke="#FF8C00" stroke-width="1.5"/>
    <path d="M18,30 L20,28 L22,30" fill="none" stroke="#FF8C00" stroke-width="1.5"/>
    <!-- Wing -->
    <ellipse cx="12" cy="18" rx="4" ry="4" fill="#FFA500"/>
  </g>
  
  <!-- Frame 3: Walk 2 (right leg forward) -->
  <g transform="translate(64,0)">
    <!-- Body -->
    <ellipse cx="16" cy="18" rx="8" ry="6" fill="#FFD700"/>
    <!-- Head -->
    <circle cx="22" cy="10" r="5" fill="#FFD700"/>
    <!-- Eye -->
    <circle cx="24" cy="9" r="1.5" fill="#000"/>
    <!-- Beak -->
    <polygon points="27,10 30,11 27,12" fill="#FF8C00"/>
    <!-- Comb -->
    <path d="M20,5 Q22,2 24,5 Q26,2 28,5" fill="#FF0000"/>
    <!-- Wattle -->
    <ellipse cx="25" cy="14" rx="1.5" ry="2" fill="#FF0000"/>
    <!-- Legs - walking -->
    <line x1="14" y1="24" x2="14" y2="30" stroke="#FF8C00" stroke-width="2"/>
    <line x1="22" y1="24" x2="24" y2="30" stroke="#FF8C00" stroke-width="2"/>
    <!-- Feet -->
    <path d="M12,30 L14,28 L16,30" fill="none" stroke="#FF8C00" stroke-width="1.5"/>
    <path d="M22,30 L24,28 L26,30" fill="none" stroke="#FF8C00" stroke-width="1.5"/>
    <!-- Wing -->
    <ellipse cx="12" cy="18" rx="4" ry="4" fill="#FFA500"/>
  </g>
  
  <!-- Frame 4: Eating (head down) -->
  <g transform="translate(96,0)">
    <!-- Body -->
    <ellipse cx="16" cy="18" rx="8" ry="6" fill="#FFD700"/>
    <!-- Head (lowered) -->
    <circle cx="24" cy="16" r="5" fill="#FFD700"/>
    <!-- Eye -->
    <circle cx="26" cy="15" r="1.5" fill="#000"/>
    <!-- Beak (pointing down) -->
    <polygon points="29,18 32,20 29,21" fill="#FF8C00"/>
    <!-- Comb -->
    <path d="M22,11 Q24,8 26,11 Q28,8 30,11" fill="#FF0000"/>
    <!-- Wattle -->
    <ellipse cx="27" cy="20" rx="1.5" ry="2" fill="#FF0000"/>
    <!-- Legs -->
    <line x1="14" y1="24" x2="14" y2="30" stroke="#FF8C00" stroke-width="2"/>
    <line x1="18" y1="24" x2="18" y2="30" stroke="#FF8C00" stroke-width="2"/>
    <!-- Feet -->
    <path d="M12,30 L14,28 L16,30" fill="none" stroke="#FF8C00" stroke-width="1.5"/>
    <path d="M16,30 L18,28 L20,30" fill="none" stroke="#FF8C00" stroke-width="1.5"/>
    <!-- Wing -->
    <ellipse cx="12" cy="18" rx="4" ry="4" fill="#FFA500"/>
  </g>
</svg>

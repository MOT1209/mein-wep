<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>وضع عدم الاتصال - Quran App</title>
    <link rel="icon" type="image/png" href="icons/icon-96x96.png">
    <link rel="manifest" href="manifest.json">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            overflow: hidden;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(99, 102, 241, 0.3);
            border-radius: 50%;
            animation: float 15s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 500px;
            padding: 40px;
        }

        .icon-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 30px;
        }

        .icon-bg {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(139, 92, 246, 0.2));
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        .icon {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: #818cf8;
        }

        .wifi-icon {
            animation: wiggle 2s ease-in-out infinite;
        }

        @keyframes wiggle {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-10deg); }
            75% { transform: rotate(10deg); }
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 1rem;
            color: #94a3b8;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .quran-verse {
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }

        .quran-verse p {
            font-size: 1.3rem;
            line-height: 2;
            color: #c4b5fd;
            font-family: 'Traditional Arabic', serif;
        }

        .quran-verse .verse-ref {
            font-size: 0.85rem;
            color: #6366f1;
            margin-top: 10px;
            font-family: 'Segoe UI', sans-serif;
        }

        .retry-btn {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border: none;
            padding: 14px 40px;
            border-radius: 12px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }

        .retry-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.6);
        }

        .retry-btn:active {
            transform: translateY(0);
        }

        .status {
            margin-top: 20px;
            font-size: 0.85rem;
            color: #64748b;
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #ef4444;
            border-radius: 50%;
            margin-left: 5px;
            animation: blink 1.5s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .tips {
            margin-top: 30px;
            text-align: right;
        }

        .tips h3 {
            font-size: 0.9rem;
            color: #818cf8;
            margin-bottom: 10px;
        }

        .tips ul {
            list-style: none;
            padding: 0;
        }

        .tips li {
            font-size: 0.85rem;
            color: #94a3b8;
            padding: 5px 0;
            padding-right: 20px;
            position: relative;
        }

        .tips li::before {
            content: '✦';
            position: absolute;
            right: 0;
            color: #6366f1;
        }

        @media (max-width: 480px) {
            .container { padding: 20px; }
            h1 { font-size: 1.5rem; }
            .quran-verse p { font-size: 1.1rem; }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <div class="container">
        <div class="icon-container">
            <div class="icon-bg"></div>
            <div class="icon">
                <span class="wifi-icon">📡</span>
            </div>
        </div>
        
        <h1>وضع عدم الاتصال</h1>
        <p class="subtitle">لا يوجد اتصال بالإنترنت حالياً<br>تحقق من اتصالك وحاول مرة أخرى</p>
        
        <div class="quran-verse">
            <p>وَقُل رَّبِّ زِدْنِي عِلْمًا</p>
            <div class="verse-ref">سورة طه - آية 114</div>
        </div>
        
        <button class="retry-btn" onclick="window.location.reload()">🔄 إعادة المحاولة</button>
        
        <div class="status">
            <span>غير متصل</span>
            <span class="status-dot"></span>
        </div>
        
        <div class="tips">
            <h3>💡 نصائح:</h3>
            <ul>
                <li>تأكد من اتصالك بالواي فاي أو البيانات</li>
                <li>قد تكون السور المحفوظة متاحة دون إنترنت</li>
                <li>جرب الانتقال لمكان ب信号 أقوى</li>
            </ul>
        </div>
    </div>

    <script>
        // Create floating particles
        const container = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 15 + 's';
            particle.style.animationDuration = (10 + Math.random() * 20) + 's';
            container.appendChild(particle);
        }
    </script>
</body>
</html>

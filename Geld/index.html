<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محول العملات المتقدم</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="converter">
        <h1>محول العملات</h1>
        <p id="date-display"></p>
        
        <form id="currency-form">
            <div class="input-row">
                <div class="form-group">
                    <label for="amount">المبلغ</label>
                    <input type="number" id="amount" placeholder="أدخل المبلغ" value="1" required>
                </div>
                <div class="form-group">
                    <label for="from-currency">من</label>
                    <select id="from-currency"></select>
                </div>
            </div>

            <div class="swap-icon" id="swap-btn">
                <i class="fas fa-exchange-alt"></i>
            </div>

            <div class="input-row">
                 <div class="form-group">
                    <label for="to-currency">إلى</label>
                    <select id="to-currency"></select>
                </div>
            </div>

            <button type="submit" id="convert-btn">حوّل الآن</button>
        </form>

        <div class="result" id="result">
            <span class="result-text">ستظهر النتيجة هنا</span>
        </div>
    </main>

    <!-- أيقونات Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    
    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المقالات الإسلامية - نور الهدى</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .page-wrapper {
            padding: 120px 20px 60px;
            min-height: 100vh;
        }

        .articles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }

        .article-card {
            display: flex;
            flex-direction: column;
            padding: 25px;
            transition: transform var(--transition-norm);
            cursor: pointer;
        }

        .article-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary-light);
        }

        .article-category {
            display: inline-block;
            background: rgba(11, 122, 117, 0.1);
            color: var(--primary-color);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 15px;
            width: fit-content;
        }

        .article-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 15px;
            color: var(--text-main);
        }

        .article-excerpt {
            color: var(--text-muted);
            font-size: 1rem;
            margin-bottom: 20px;
            flex-grow: 1;
        }

        .article-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--border-glass);
            padding-top: 15px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        #articles-list-view,
        #article-reader {
            transition: opacity 0.3s ease;
        }

        #article-reader {
            display: none;
            max-width: 900px;
            margin: 0 auto;
            opacity: 0;
        }

        .reader-title {
            font-family: 'Amiri', serif;
            font-size: 2.8rem;
            color: var(--primary-color);
            margin-bottom: 20px;
            line-height: 1.3;
        }

        .reader-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            color: var(--text-muted);
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-glass);
            font-size: 1rem;
        }

        .reader-meta span i {
            color: var(--secondary-color);
            margin-left: 5px;
        }

        .article-reader-content {
            font-family: 'Amiri', serif;
            font-size: 1.4rem;
            line-height: 2.2;
            color: var(--text-main);
            text-align: justify;
        }

        .article-p {
            margin-bottom: 25px;
        }

        /* Knowledge Panel Premium Design */
        .knowledge-panel {
            margin-top: 60px;
            padding: 40px;
            border-right: 5px solid var(--secondary-color);
            background: rgba(255, 255, 255, 0.03);
        }

        .knowledge-header {
            font-size: 1.5rem;
            color: var(--secondary-color);
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .knowledge-grid-mini {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .knowledge-card-mini {
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-glass);
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .knowledge-card-mini:hover {
            background: rgba(11, 122, 117, 0.1);
            border-color: var(--primary-color);
            transform: scale(1.02);
        }

        .knowledge-type-badge {
            display: inline-block;
            font-size: 0.75rem;
            padding: 3px 8px;
            background: var(--primary-color);
            color: white;
            border-radius: 4px;
            margin-bottom: 10px;
        }

        .knowledge-relation {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 15px;
        }

        .knowledge-link {
            color: var(--secondary-color);
            font-weight: 700;
            text-decoration: none;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }
    </style>
</head>

<body>
    <header class="glass-header">
        <div class="container nav-container">
            <a href="index.html" class="logo"><i class="fa-solid fa-mosque"></i> نور الهدى</a>
            <div class="header-search">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="global-search" placeholder="ابحث في المقالات والمواضيع...">
            </div>
            <nav class="main-nav">
                <ul>
                    <li><a href="index.html">الرئيسية</a></li>
                    <li><a href="quran.html">القرآن الكريم</a></li>
                    <li><a href="hadith.html">الأحاديث النبوية</a></li>
                    <li><a href="prayer.html">مواقيت الصلاة</a></li>
                    <li><a href="azkar.html">الأذكار</a></li>
                    <li><a href="articles.html" class="active">المقالات</a></li>
                    <li><a href="names-of-allah.html">أسماء الله الحسنى</a></li>
                    <li><a href="zakat.html">الزكاة</a></li>
                </ul>
            </nav>
            <button class="theme-toggle" id="theme-toggle"><i class="fa-solid fa-moon"></i></button>
            <button class="menu-toggle" id="menu-toggle"><i class="fa-solid fa-bars"></i></button>
        </div>
    </header>

    <main class="container page-wrapper">
        <div id="articles-list-view">
            <h2 class="section-title">المقالات والبحوث الإسلامية</h2>
            <div id="loader" style="text-align: center; font-size: 1.5rem; color: var(--primary-color);">
                <i class="fa-solid fa-spinner fa-spin"></i> جاري التحميل...
            </div>
            <div id="articles-grid" class="articles-grid"></div>
        </div>

        <div id="article-reader" class="glass-panel" style="padding: 40px;">
            <button class="btn btn-secondary" onclick="backToArticles()" style="margin-bottom: 20px;">
                <i class="fa-solid fa-arrow-right"></i> عودة للمقالات
            </button>
            <div class="article-category" id="reader-category"></div>
            <h1 class="reader-title" id="reader-title"></h1>
            <div class="reader-meta">
                <span id="reader-author"><i class="fa-solid fa-user-edit"></i> </span>
                <span id="reader-date"><i class="fa-regular fa-calendar-days"></i> </span>
                <span id="reader-views"><i class="fa-solid fa-eye"></i> </span>
            </div>
            <div class="article-reader-content" id="reader-content"></div>
        </div>
    </main>

    <script src="app.js"></script>
    <script src="articles.js"></script>
    <!-- Global Search Overlay -->
    <div id="search-overlay" class="search-overlay">
        <button class="close-search-overlay" onclick="toggleSearchOverlay()">&times;</button>
        <div class="search-modal-container">
            <div class="search-input-wrapper">
                <i class="fa-solid fa-magic"></i>
                <input type="text" id="overlay-search-input" placeholder="اكتب للبحث في القرآن والسنة..."
                    autocomplete="off">
            </div>
            <div id="search-results" class="search-results-area">
                <div style="text-align: center; color: var(--text-muted); padding: 40px;">
                    <i class="fa-solid fa-keyboard" style="font-size: 3rem; margin-bottom: 20px; display: block;"></i>
                    ابدأ الكتابة للبحث الشامل...
                </div>
            </div>
        </div>
    </div>
</body>

</html>

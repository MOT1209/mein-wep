<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الأذكار والأدعية - نور الهدى</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .page-wrapper {
            padding: 120px 20px 60px;
            min-height: 100vh;
        }

        .categories-filter {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 40px;
        }

        .cat-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid var(--border-glass);
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-family: inherit;
            font-size: 1rem;
            color: var(--text-main);
            transition: var(--transition-fast);
        }

        .cat-btn:hover,
        .cat-btn.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .azkar-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        .zekr-card {
            padding: 25px;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .zekr-card:hover {
            transform: translateY(-5px);
            border-color: var(--secondary-color);
        }

        .zekr-card.completed {
            opacity: 0.7;
            background: rgba(100, 116, 139, 0.1);
            border-color: var(--text-muted);
        }

        .zekr-text {
            font-family: 'Amiri', serif;
            font-size: 1.6rem;
            line-height: 1.8;
            color: var(--text-main);
        }

        .zekr-meta {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            border-top: 1px solid var(--border-glass);
            padding-top: 15px;
        }

        .zekr-fadl {
            font-size: 0.95rem;
            color: var(--text-muted);
            font-style: italic;
            border-right: 3px solid var(--secondary-color);
            padding-right: 10px;
        }

        .zekr-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .zekr-source {
            font-size: 0.85rem;
            color: var(--primary-color);
            font-weight: 500;
        }

        .zekr-count {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(11, 122, 117, 0.3);
            transition: all 0.2s;
            min-width: 100px;
            text-align: center;
        }

        .zekr-count:hover {
            filter: brightness(1.1);
            transform: scale(1.05);
        }

        .zekr-count:active {
            transform: scale(0.95);
        }

        .zekr-count.done {
            background: var(--text-muted);
            box-shadow: none;
            cursor: default;
        }
    </style>
</head>

<body>
    <header class="glass-header">
        <div class="container nav-container">
            <a href="index.html" class="logo"><i class="fa-solid fa-mosque"></i> نور الهدى</a>
            <div class="header-search">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="global-search" placeholder="ابحث في الأذكار والأدعية...">
            </div>
            <nav class="main-nav">
                <ul>
                    <li><a href="index.html">الرئيسية</a></li>
                    <li><a href="quran.html">القرآن الكريم</a></li>
                    <li><a href="hadith.html">الأحاديث النبوية</a></li>
                    <li><a href="prayer.html">مواقيت الصلاة</a></li>
                    <li><a href="azkar.html" class="active">الأذكار</a></li>
                    <li><a href="articles.html">المقالات</a></li>
                    <li><a href="names-of-allah.html">أسماء الله الحسنى</a></li>
                    <li><a href="zakat.html">الزكاة</a></li>
                </ul>
            </nav>
            <button class="theme-toggle" id="theme-toggle"><i class="fa-solid fa-moon"></i></button>
            <button class="menu-toggle" id="menu-toggle"><i class="fa-solid fa-bars"></i></button>
        </div>
    </header>

    <main class="container page-wrapper">
        <h2 class="section-title">حصن المسلم</h2>

        <div class="quran-controls glass-panel">
            <div class="quran-search">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="azkar-search-input" placeholder="ابحث في متن الذكر أو الفضل..."
                    oninput="filterAzkar()">
            </div>

            <div class="quran-tabs" id="azkar-tabs">
                <!-- سيتم إضافة الأقسام الرئيسية هنا -->
                <button class="tab-btn active" onclick="switchAzkarTab('أذكار الصباح والمساء')">
                    <i class="fa-solid fa-sun"></i> الصباح والمساء
                </button>
                <button class="tab-btn" onclick="switchAzkarTab('أذكار الصلاة')">
                    <i class="fa-solid fa-mosque"></i> بعد الصلاة
                </button>
                <button class="tab-btn" onclick="switchAzkarTab('أذكار النوم والاستيقاظ')">
                    <i class="fa-solid fa-bed"></i> النوم
                </button>
                <button class="tab-btn" onclick="switchAzkarTab('أدعية عامة')">
                    <i class="fa-solid fa-hands-praying"></i> أدعية
                </button>
            </div>
        </div>

        <div id="loader" style="text-align: center; font-size: 1.5rem; color: var(--primary-color);">
            <i class="fa-solid fa-spinner fa-spin"></i> جاري التحميل...
        </div>

        <div id="azkar-container" class="azkar-grid">
            <!-- سيتم إضافة الأذكار هنا -->
        </div>
    </main>

    <script src="app.js"></script>
    <script src="azkar.js"></script>
    <!-- Global Search Overlay -->
    <div id="search-overlay" class="search-overlay">
        <button class="close-search-overlay" onclick="toggleSearchOverlay()">&times;</button>
        <div class="search-modal-container">
            <div class="search-input-wrapper">
                <i class="fa-solid fa-magic"></i>
                <input type="text" id="overlay-search-input" placeholder="اكتب للبحث في القرآن والسنة..." autocomplete="off">
            </div>
            <div id="search-results" class="search-results-area">
                <div style="text-align: center; color: var(--text-muted); padding: 40px;">
                    <i class="fa-solid fa-keyboard" style="font-size: 3rem; margin-bottom: 20px; display: block;"></i>
                    ابدأ الكتابة للبحث الشامل...
                </div>
            </div>
        </div>
    </div>
</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rust Game Module Test | Rashid</title>
</head>
<body>
<pre id="log"></pre>
<script>
const log = document.getElementById('log');
function addLog(msg) { log.textContent += msg + '\n'; }
addLog('Testing Rust game module...');

// Test importing the module
try {
    // Check if the module syntax is valid by evaluating imports
    addLog('Checking import map...');
    
    // Test the terrain functions directly
    const code = `function hash(x, z) {
        let h = x * 374761393 + z * 668265263;
        h = (h ^ (h >> 13)) * 1274126177;
        return (h ^ (h >> 16)) / 2147483647;
    }
    function smoothNoise(x, z) {
        const ix = Math.floor(x);
        const iz = Math.floor(z);
        const fx = x - ix;
        const fz = z - iz;
        const sx = fx * fx * (3 - 2 * fx);
        const sz = fz * fz * (3 - 2 * fz);
        const v00 = hash(ix, iz);
        const v10 = hash(ix + 1, iz);
        const v01 = hash(ix, iz + 1);
        const v11 = hash(ix + 1, iz + 1);
        const v0 = v00 + (v10 - v00) * sx;
        const v1 = v01 + (v11 - v01) * sx;
        return v0 + (v1 - v0) * sz;
    }
    function fbm(x, z) {
        let value = 0, amplitude = 1, frequency = 1, maxVal = 0;
        for (let i = 0; i < 4; i++) {
            value += amplitude * smoothNoise(x * frequency, z * frequency);
            maxVal += amplitude;
            amplitude *= 0.5;
            frequency *= 2;
        }
        return value / maxVal;
    }
    function getTerrainHeight(x, z) {
        const h1 = fbm(x * 0.015, z * 0.015) * 8;
        const h2 = fbm(x * 0.04, z * 0.04) * 3;
        const h3 = Math.sin(x * 0.02) * Math.cos(z * 0.025) * 1.5;
        const baseHeight = h1 + h2 + h3;
        const distFromOrigin = Math.sqrt(x * x + z * z);
        const blend = Math.min(1, distFromOrigin / 15);
        return 0 + (baseHeight - 0) * Math.max(0, blend * blend * (3 - 2 * blend));
    }
    let results = [];
    for (let x = -200; x <= 200; x += 50) {
        for (let z = -200; z <= 200; z += 50) {
            const h = getTerrainHeight(x, z);
            if (isNaN(h) || !isFinite(h)) results.push('INVALID at ('+x+','+z+'): '+h);
        }
    }
    if (results.length === 0) {
        for (let x = -200; x <= 200; x += 10) {
            for (let z = -200; z <= 200; z += 10) {
                getTerrainHeight(x, z);
            }
        }
        // Also test at spawn
        const spawnH = getTerrainHeight(0, 0);
        const farH = getTerrainHeight(100, 100);
        results.push('Terrain OK. Spawn height: ' + spawnH + ', Far height: ' + farH);
    }
    addLog(results.join('\\n'));
    addLog('Terrain test passed!');
} catch(e) {
    addLog('ERROR: ' + e.message);
    addLog('Stack: ' + e.stack);
}
</script>
</body></html>

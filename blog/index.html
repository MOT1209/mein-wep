<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Rashid Blog — Articles on web development, game dev with Three.js, AI/ML, and open-source projects. English &amp; العربية.">
    <meta name="robots" content="index, follow">

    <meta property="og:type" content="website">
    <meta property="og:title" content="Blog | Rashid — Web Dev, Game Dev & AI">
    <meta property="og:description" content="Articles on web development, game dev with Three.js, AI integration, and open-source projects by Rashid (MOT1209).">
    <meta property="og:image" content="../images/logo.webp">
    <meta property="og:url" content="https://rashid-wep.vercel.app/blog/">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Blog | Rashid">
    <meta name="twitter:description" content="Articles on web dev, game dev with Three.js, AI, and open-source.">
    <meta name="twitter:image" content="../images/logo.webp">
    <title>Blog | Rashid — Web Dev, Game Dev & AI</title>
    <link rel="alternate" type="application/rss+xml" title="Rashid Blog RSS" href="/api/rss">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css?v=9.2">
    <link rel="stylesheet" href="../css/blog-post.css?v=1.0">
    <style>
        .blog-hero { text-align: center; padding: 80px 20px 40px; max-width: 750px; margin: 0 auto; }
        .blog-hero .hero-icon { font-size: 2.8rem; color: var(--accent); margin-bottom: 16px; display: block; }
        .blog-hero .hero-icon i { background: var(--accent-subtle); padding: 14px; border-radius: 50%; }
        .blog-hero h1 { font-size: clamp(2rem, 4vw, 3rem); color: var(--text-high); margin-bottom: 12px; font-weight: 800; letter-spacing: -0.03em; }
        .blog-hero h1 .highlight { color: var(--accent); }
        .blog-hero p { color: var(--text-muted); font-size: 1.05rem; line-height: 1.7; max-width: 550px; margin: 0 auto 24px; }
        .blog-hero .rss-link { color: var(--accent); text-decoration: none; font-size: 0.85rem; display: inline-flex; align-items: center; gap: 6px; transition: var(--transition); }
        .blog-hero .rss-link:hover { gap: 10px; }
        .blog-stats { display: flex; justify-content: center; gap: 32px; margin-top: 28px; }
        .blog-stats span { color: var(--text-muted); font-size: 0.85rem; display: flex; align-items: center; gap: 6px; }
        .blog-stats span strong { color: var(--text-high); }

        .blog-controls { max-width: 900px; margin: 0 auto; padding: 0 24px 20px; display: flex; flex-direction: column; gap: 16px; }
        .search-bar { position: relative; }
        .search-bar i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 0.9rem; }
        .search-bar input { width: 100%; padding: 14px 16px 14px 44px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg-alt); color: var(--text-high); font-family: var(--font-body); font-size: 0.95rem; transition: var(--transition); box-sizing: border-box; }
        .search-bar input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(var(--accent-rgb), 0.12); }
        .search-bar input::placeholder { color: var(--text-muted); }
        .filter-bar { display: flex; gap: 10px; flex-wrap: wrap; }
        .filter-btn { padding: 8px 18px; border-radius: 100px; border: 1px solid var(--border); background: transparent; color: var(--text-med); font-family: var(--font-body); font-size: 0.85rem; cursor: pointer; transition: var(--transition); }
        .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
        .filter-btn.active { background: var(--accent-subtle); border-color: var(--accent); color: var(--accent); font-weight: 600; }

        .articles-section { max-width: 900px; margin: 0 auto; padding: 0 24px 60px; }
        .articles-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .article-card {
            display: flex; flex-direction: column; gap: 16px;
            background: var(--bg-alt); border: 1px solid var(--border);
            border-radius: var(--radius-md); padding: 24px;
            text-decoration: none; transition: var(--transition);
            position: relative; overflow: hidden;
        }
        .article-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--accent), var(--accent-2)); opacity: 0; transition: var(--transition); }
        .article-card:hover { border-color: var(--accent); transform: translateY(-4px); box-shadow: 0 12px 32px rgba(0,0,0,0.2); }
        .article-card:hover::before { opacity: 1; }
        .article-card .card-top { display: flex; align-items: flex-start; gap: 16px; }
        .article-card .card-icon { width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; border-radius: 14px; font-size: 1.3rem; flex-shrink: 0; }
        .article-card .card-info { flex: 1; min-width: 0; }
        .article-card .card-lang { display: inline-block; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; padding: 2px 8px; border-radius: 4px; margin-bottom: 6px; }
        .article-card .card-lang.en { background: rgba(56,189,248,0.12); color: #38bdf8; }
        .article-card .card-lang.ar { background: rgba(52,211,153,0.12); color: #34d399; }
        .article-card h3 { color: var(--text-high); font-size: 1.05rem; margin: 0 0 6px; font-weight: 600; line-height: 1.35; }
        .article-card p { color: var(--text-med); font-size: 0.85rem; line-height: 1.6; margin: 0; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .article-card .card-meta { display: flex; gap: 12px; margin-top: auto; font-size: 0.78rem; color: var(--text-muted); flex-wrap: wrap; }
        .article-card .card-meta span { display: flex; align-items: center; gap: 4px; }
        .card-tags { display: flex; gap: 6px; flex-wrap: wrap; }
        .card-tag { display: inline-block; background: rgba(255,255,255,0.04); color: var(--text-muted); padding: 2px 10px; border-radius: 100px; font-size: 0.68rem; font-weight: 500; }

        .no-results { text-align: center; padding: 60px 20px; grid-column: 1 / -1; }
        .no-results i { font-size: 3rem; color: var(--text-muted); margin-bottom: 16px; display: block; }
        .no-results p { color: var(--text-muted); font-size: 1rem; }

        .categories-section { max-width: 700px; margin: 0 auto 60px; padding: 0 20px; }
        .categories-section h2 { color: var(--text-high); font-size: 1.2rem; margin-bottom: 20px; text-align: center; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .categories-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; }
        .category-tag { background: var(--bg-alt); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 16px 12px; text-align: center; cursor: pointer; transition: var(--transition); }
        .category-tag:hover { border-color: var(--accent); transform: translateY(-2px); }
        .category-tag i { font-size: 1.3rem; color: var(--accent); margin-bottom: 6px; display: block; }
        .category-tag h3 { color: var(--text-high); font-size: 0.82rem; font-weight: 600; margin: 0 0 4px; }
        .category-tag span { color: var(--text-muted); font-size: 0.72rem; }

        @media (max-width: 768px) {
            .blog-hero { padding: 60px 20px 30px; }
            .blog-stats { gap: 20px; flex-wrap: wrap; }
            .articles-grid { grid-template-columns: 1fr; }
            .blog-controls { padding: 0 16px 16px; }
            .articles-section { padding: 0 16px 40px; }
            .categories-grid { grid-template-columns: repeat(3, 1fr); }
        }
        @media (max-width: 480px) {
            .categories-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body class="dark-mode">
    <nav class="navbar" role="navigation">
        <div class="nav-inner">
            <a href="../index.html" class="nav-logo">Rashid<span>.</span></a>
            <div class="nav-links">
                <a href="../index.html">Home</a>
                <a href="../index.html#projects">Projects</a>
                <a href="../index.html#skills">Skills</a>
                <a href="../index.html#contact">Contact</a>
            </div>
            <div class="nav-actions">
                <button class="nav-btn" id="theme-toggle" aria-label="Toggle theme"><i class="fas fa-sun"></i></button>
            </div>
        </div>
    </nav>

    <main>
        <section class="blog-hero">
            <span class="hero-icon"><i aria-hidden="true" class="fas fa-pen-fancy"></i></span>
            <h1>Rashid <span class="highlight">Blog</span></h1>
            <p>Articles on web development, game dev with Three.js, AI/ML, and open-source projects.</p>
            <a href="/api/rss" class="rss-link"><i aria-hidden="true" class="fas fa-rss"></i> Subscribe via RSS</a>
            <div class="blog-stats" id="blog-stats">
                <span><i class="fas fa-newspaper"></i> <strong id="total-posts">0</strong> articles</span>
                <span><i class="fas fa-clock"></i> ~<strong id="total-read-time">0</strong> min total</span>
                <span><i class="fas fa-tags"></i> <strong id="total-categories">0</strong> categories</span>
            </div>
        </section>

        <div class="blog-controls">
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" id="search-input" placeholder="Search articles..." aria-label="Search articles">
            </div>
            <div class="filter-bar" id="filter-bar">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="en">English</button>
                <button class="filter-btn" data-filter="ar">العربية</button>
            </div>
        </div>

        <section class="articles-section">
            <div class="articles-grid" id="articles-grid">
                <div class="no-results">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>Loading articles...</p>
                </div>
            </div>
        </section>

        <section class="categories-section" id="categories-section">
            <h2><i class="fas fa-tags" style="color:var(--accent);"></i> Categories</h2>
            <div class="categories-grid" id="categories-grid">
                <div style="text-align:center;grid-column:1/-1;color:var(--text-muted);font-size:0.85rem;">Loading...</div>
            </div>
        </section>
    </main>

    <script>
    (function() {
        var posts = [];
        var categories = {};
        var currentFilter = 'all';
        var currentSearch = '';

        function formatDate(dateStr) {
            var d = new Date(dateStr + 'T00:00:00Z');
            var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
            var monthsAr = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
            var isRtl = document.documentElement.dir === 'rtl';
            var m = isRtl ? monthsAr : months;
            return m[d.getUTCMonth()] + ' ' + d.getUTCDate() + ', ' + d.getUTCFullYear();
        }

        function langLabel(lang) {
            if (lang === 'ar') return '<span class="card-lang ar">العربية</span>';
            return '<span class="card-lang en">English</span>';
        }

        function renderGrid(items) {
            var grid = document.getElementById('articles-grid');
            if (items.length === 0) {
                grid.innerHTML = '<div class="no-results"><i class="fas fa-search"></i><p>No articles match your criteria.</p></div>';
                return;
            }
            grid.innerHTML = items.map(function(p) {
                var tags = p.categories.map(function(c) { return '<span class="card-tag">' + c + '</span>'; }).join('');
                return '<a href="' + p.id + '.html" class="article-card">' +
                    '<div class="card-top">' +
                        '<div class="card-icon" style="background:' + p.iconBg + ';color:' + p.iconColor + ';"><i class="fas fa-' + p.icon + '"></i></div>' +
                        '<div class="card-info">' +
                            langLabel(p.lang) +
                            '<h3>' + p.title + '</h3>' +
                            '<p>' + p.description + '</p>' +
                        '</div>' +
                    '</div>' +
                    '<div class="card-meta">' +
                        '<span><i class="fas fa-calendar"></i> ' + formatDate(p.date) + '</span>' +
                        '<span><i class="fas fa-clock"></i> ' + p.readTime + ' min</span>' +
                        '<div class="card-tags">' + tags + '</div>' +
                    '</div>' +
                '</a>';
            }).join('');
        }

        function applyFilters() {
            var filtered = posts.filter(function(p) {
                if (currentFilter !== 'all' && p.lang !== currentFilter) return false;
                if (currentSearch) {
                    var q = currentSearch.toLowerCase();
                    var match = p.title.toLowerCase().indexOf(q) !== -1 ||
                        p.description.toLowerCase().indexOf(q) !== -1 ||
                        p.categories.some(function(c) { return c.toLowerCase().indexOf(q) !== -1; });
                    if (!match) return false;
                }
                return true;
            });
            renderGrid(filtered);
        }

        function renderCategories() {
            var grid = document.getElementById('categories-grid');
            var keys = Object.keys(categories).sort();
            if (keys.length === 0) {
                grid.innerHTML = '<div style="text-align:center;grid-column:1/-1;color:var(--text-muted);font-size:0.85rem;">No categories yet.</div>';
                return;
            }
            var icons = {
                'Game Dev':'gamepad','AI & ML':'microchip','Web Dev':'globe','Backend':'database','Mobile':'mobile-screen','Web Design':'paintbrush','CSS':'code','Game AI':'robot','Flutter':'layer-group','LoRA':'microchip','Supabase':'database','PWA':'mobile-screen','Three.js':'cube','SEO':'rocket'
            };
            grid.innerHTML = keys.map(function(cat) {
                var icon = icons[cat] || 'tag';
                return '<div class="category-tag">' +
                    '<i class="fas fa-' + icon + '"></i>' +
                    '<h3>' + cat + '</h3>' +
                    '<span>' + categories[cat] + ' article' + (categories[cat] !== 1 ? 's' : '') + '</span>' +
                '</div>';
            }).join('');
        }

        function updateStats() {
            document.getElementById('total-posts').textContent = posts.length;
            var totalTime = posts.reduce(function(sum, p) { return sum + p.readTime; }, 0);
            document.getElementById('total-read-time').textContent = totalTime;
            document.getElementById('total-categories').textContent = Object.keys(categories).length;
        }

        function initFilterButtons() {
            var btns = document.querySelectorAll('.filter-btn');
            btns.forEach(function(btn) {
                btn.addEventListener('click', function() {
                    btns.forEach(function(b) { b.classList.remove('active'); });
                    this.classList.add('active');
                    currentFilter = this.getAttribute('data-filter');
                    applyFilters();
                });
            });
        }

        function initSearch() {
            var input = document.getElementById('search-input');
            var timer;
            input.addEventListener('input', function() {
                clearTimeout(timer);
                timer = setTimeout(function() {
                    currentSearch = input.value;
                    applyFilters();
                }, 200);
            });
        }

        fetch('posts.json?_=' + Date.now())
            .then(function(r) { return r.json(); })
            .then(function(data) {
                posts = data;
                categories = {};
                posts.forEach(function(p) {
                    p.categories.forEach(function(c) {
                        categories[c] = (categories[c] || 0) + 1;
                    });
                });
                updateStats();
                renderCategories();
                applyFilters();
            })
            .catch(function() {
                document.getElementById('articles-grid').innerHTML =
                    '<div class="no-results"><i class="fas fa-exclamation-triangle" style="color:#ef4444;"></i><p>Failed to load articles. Please try again later.</p></div>';
            });

        initFilterButtons();
        initSearch();
    })();
    </script>
    <script src="../src/js/main.js" type="module"></script>
</body>
</html>

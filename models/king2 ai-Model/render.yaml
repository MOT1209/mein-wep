services:
  - type: web
    name: king2-backend
    env: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/keep-alive
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: PORT
        value: "5000"

      # === API Keys (required - set in Render Dashboard) ===
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: ZAI_API_KEY
        sync: false

      # === Admin ===
      - key: RASHID_USERNAME
        value: admin
      - key: RASHID_PASSWORD
        sync: false

      # === Supabase (optional) ===
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false

      # === OAuth ===
      - key: OAUTH_REDIRECT_BASE
        value: https://alking-ai-king2-f4rr.vercel.app

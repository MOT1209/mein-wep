<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم KING2</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #0f0f1a 100%);
            color: #e0e0e0;
            min-height: 100vh;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            background: linear-gradient(135deg, #fbbf24, #d97706);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 15px 40px rgba(251, 191, 36, 0.3);
            position: relative;
            overflow: hidden;
        }
        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 50%);
            animation: shimmer 3s ease-in-out infinite;
        }
        @keyframes shimmer {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(180deg); }
        }
        .header h1 {
            color: #0f0f1a;
            font-size: 2.5rem;
            font-weight: 900;
            margin-bottom: 10px;
            position: relative;
            z-index: 1;
        }
        .header .subtitle {
            color: #0f0f1a;
            font-size: 1rem;
            position: relative;
            z-index: 1;
            opacity: 0.8;
        }
        .nav-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
            position: relative;
            z-index: 1;
        }
        .nav-btn {
            background: #0f0f1a;
            color: white;
            padding: 12px 25px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }
        .nav-btn:hover {
            background: #1a1a2e;
            transform: translateY(-3px);
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            border: 2px solid #ffd700;
            transition: all 0.3s;
        }
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(251, 191, 36, 0.2);
        }
        .stat-number {
            color: #ffd700;
            font-size: 2.5rem;
            font-weight: 900;
            display: block;
            margin-bottom: 10px;
        }
        .stat-label {
            color: #888;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .section {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 25px;
            border-radius: 20px;
            margin-bottom: 30px;
            border: 1px solid #333;
        }
        .section h2 {
            color: #ffd700;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #ffd700;
            font-size: 1.3rem;
        }
        .chat-table {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            background: #0f0f23;
            color: #ffd700;
            padding: 15px;
            text-align: right;
            font-weight: 700;
            border-bottom: 2px solid #ffd700;
        }
        td {
            padding: 15px;
            border-bottom: 1px solid #333;
            text-align: right;
        }
        tr:hover {
            background: rgba(255, 215, 0, 0.1);
        }
        .api-tag {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .time-tag {
            color: #666;
            font-size: 0.85rem;
        }
        .message-cell {
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .loading {
            text-align: center;
            padding: 50px;
            color: #ffd700;
            font-size: 1.2rem;
        }
        .error-msg {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid #ef4444;
            color: #ef4444;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }
        .crown-icon {
            font-size: 3rem;
            display: block;
            margin-bottom: 10px;
            animation: crownFloat 3s ease-in-out infinite;
        }
        @keyframes crownFloat {
            0%, 100% { transform: translateY(0) rotate(-2deg); }
            50% { transform: translateY(-10px) rotate(2deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <span class="crown-icon">👑</span>
            <h1>KING2 لوحة التحكم</h1>
            <p class="subtitle">مساعد الذكاء الاصطناعي الملكي</p>
            <div class="nav-buttons">
                <a href="/" class="nav-btn">🏠 الرئيسية</a>
                <a href="/chat" class="nav-btn">💬 المحادثة</a>
                <a href="/admin" class="nav-btn">🔐 تسجيل خروج</a>
            </div>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-number" id="total-chats">-</span>
                <span class="stat-label">المحادثات</span>
            </div>
            <div class="stat-card">
                <span class="stat-number" id="total-users">-</span>
                <span class="stat-label">المستخدمين</span>
            </div>
            <div class="stat-card">
                <span class="stat-number" id="avg-response">-</span>
                <span class="stat-label">متوسط الرد</span>
            </div>
            <div class="stat-card">
                <span class="stat-number" id="api-used">-</span>
                <span class="stat-label">API الأكثر استخداماً</span>
            </div>
        </div>
        
        <div class="section">
            <h2>💬 أحدث المحادثات</h2>
            <div class="chat-table" id="chats-container">
                <div class="loading">جاري تحميل المحا��ثات...</div>
            </div>
        </div>
    </div>

    <script>
        async function loadDashboard() {
            try {
                // جلب الإحصائيات
                const statsRes = await fetch('/stats');
                const stats = await statsRes.json();
                
                document.getElementById('total-chats').textContent = stats.memory_entries?.toLocaleString() || '0';
                document.getElementById('total-users').textContent = '1';
                document.getElementById('avg-response').textContent = '~3s';
                document.getElementById('api-used').textContent = 'Groq';
                
                // جلب المحادثات من API JSON
                const convsRes = await fetch('/admin/conversations');
                const conversations = await convsRes.json();
                
                console.log('Conversations:', conversations);
                
                if (conversations && conversations.length > 0) {
                    let tableHtml = '<table><tr><th>المستخدم</th><th>الرسالة</th><th>الرد</th><th>النموذج</th><th>الوقت</th></tr>';
                    
                    conversations.forEach(conv => {
                        tableHtml += `<tr>
                            <td>${conv.username || 'مستخدم'}</td>
                            <td class="message-cell" title="${conv.user_message}">${(conv.user_message || '').substring(0, 50)}</td>
                            <td class="message-cell" title="${conv.ai_response}">${(conv.ai_response || '').substring(0, 60)}...</td>
                            <td><span class="api-tag">${conv.api_provider}</span></td>
                            <td class="time-tag">${conv.timestamp}</td>
                        </tr>`;
                    });
                    tableHtml += '</table>';
                    document.getElementById('chats-container').innerHTML = tableHtml;
                } else {
                    document.getElementById('chats-container').innerHTML = '<div class="error-msg">لا توجد محادثات بعد</div>';
                }
                
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('chats-container').innerHTML = '<div class="error-msg">خطأ في تحميل البيانات</div>';
            }
        }
        
        // تحميل عند فتح الصفحة
        loadDashboard();
    </script>
</body>
</html>
